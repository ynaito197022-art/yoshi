<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yoshi App</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2937;
      background: #f3f4f6;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: #ffffff;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1.1;
    }

    p {
      font-size: 18px;
      line-height: 1.8;
      margin: 0 0 24px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      background: #2563eb;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #message {
      margin-top: 20px;
      font-weight: 700;
      color: #047857;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">GitHub Starter</span>
    <h1>Yoshi App</h1>
    <p>
      このページは、GitHubリポジトリ <strong>yoshi</strong> の初期ページです。<br />
      ここからHTML / CSS / JavaScriptを追加して、アプリとして育てていけます。
    </p>
    <button id="actionButton">動作確認</button>
    <div id="message" aria-live="polite"></div>
  </main>

  <script>
    const button = document.getElementById('actionButton');
    const message = document.getElementById('message');

    button.addEventListener('click', () => {
      message.textContent = 'JavaScriptも正常に動いています。';
    });
  </script>
</body>
</html>
